<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Low-Poly Mushroom Model</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #eeeeee; }
        canvas { display: block; }
    </style>
    
    <script type="importmap">
        {
          "imports": {
            "three": "https://threejs.org/build/three.module.js",
            "three/addons/": "https://threejs.org/examples/jsm/"
          }
        }
    </script>
</head>
<body>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";

        // --- Configuração Básica da Cena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeeeeee); // Fundo cinza claro

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 7); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Ativar sombras
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0); 
        controls.update();

        // --- ILUMINAÇÃO ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // Luz suave geral
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7.5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        scene.add(directionalLight);

        // --- MATERIAIS ---
        const redMaterial = new THREE.MeshPhongMaterial({ color: 0xcc2222, flatShading: true }); 
        const whiteMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: true }); 
        const stemMaterial = new THREE.MeshPhongMaterial({ color: 0xe6e0c8, flatShading: true }); // Creme acinzentado
        const brownMaterial = new THREE.MeshPhongMaterial({ color: 0x8b5a2b, flatShading: true }); 
        const blackMaterial = new THREE.MeshPhongMaterial({ color: 0x222222, flatShading: true }); 
        const pinkMaterial = new THREE.MeshPhongMaterial({ color: 0xff8899, flatShading: true }); 

        // --- CONSTRUÇÃO DO MODELO ---

        // 1. O Chapéu (Hemisfério Vermelho)
        const capGeometry = new THREE.SphereGeometry(2.2, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2);
        const mushroomCap = new THREE.Mesh(capGeometry, redMaterial);
        mushroomCap.position.y = 3; 
        mushroomCap.castShadow = true; 
        scene.add(mushroomCap);

        // 2. Pintas Brancas no Chapéu
        const spotGeometry = new THREE.CylinderGeometry(0.25, 0.25, 0.05, 12); 
        const spotPositions = [
            { phi: 0, theta: 0 },               // Topo
            { phi: 0.6, theta: 0 },             
            { phi: 0.6, theta: Math.PI / 2 },
            { phi: 0.6, theta: Math.PI },
            { phi: 0.6, theta: -Math.PI / 2 },
            { phi: 1.1, theta: Math.PI / 4 },    
            { phi: 1.1, theta: (3 * Math.PI) / 4 },
            { phi: 1.1, theta: -(3 * Math.PI) / 4 },
            { phi: 1.1, theta: -Math.PI / 4 },
        ];

        spotPositions.forEach(pos => {
            const spot = new THREE.Mesh(spotGeometry, whiteMaterial);
            
            // Colocar na superfície do chapéu (raio 2.21 para não bugar a textura)
            const radius = 2.21;
            const x = radius * Math.sin(pos.phi) * Math.cos(pos.theta);
            const y = radius * Math.cos(pos.phi);
            const z = radius * Math.sin(pos.phi) * Math.sin(pos.theta);

            spot.position.set(x, y, z);

            // Orientar pinta para o exterior
            const target = new THREE.Vector3(x, y, z).multiplyScalar(2);
            spot.lookAt(target);
            spot.rotateX(Math.PI / 2); // Deitar o cilindro

            mushroomCap.add(spot);
        });

        // 3. A Base do Chapéu (Lamelas Brancas)
        const capBaseGeometry = new THREE.CylinderGeometry(2.2, 2.2, 0.2, 16);
        const mushroomCapBase = new THREE.Mesh(capBaseGeometry, whiteMaterial);
        mushroomCapBase.position.y = 3; 
        mushroomCapBase.receiveShadow = true; 
        scene.add(mushroomCapBase);

        // 4. O Caule/Corpo (Creme)
        const stemGeometry = new THREE.CylinderGeometry(0.8, 0.9, 3.2, 16); 
        const stem = new THREE.Mesh(stemGeometry, stemMaterial);
        stem.position.y = 1.4; 
        stem.castShadow = true;
        stem.receiveShadow = true; 
        scene.add(stem);

        // --- ROSTO (Adicionado diretamente ao Caule) ---
        // Olho Esquerdo
        const eyeGeometry = new THREE.CylinderGeometry(0.08, 0.08, 0.05, 12);
        eyeGeometry.rotateX(Math.PI / 2); // Virar para a frente
        const eyeL = new THREE.Mesh(eyeGeometry, blackMaterial);
        eyeL.position.set(-0.3, 0.8, 0.95); // Z ligeiramente fora do caule
        stem.add(eyeL);

        // Olho Direito
        const eyeR = new THREE.Mesh(eyeGeometry, blackMaterial);
        eyeR.position.set(0.3, 0.8, 0.95);
        stem.add(eyeR);

        // Brilho Olho Esquerdo
        const glintGeometry = new THREE.CylinderGeometry(0.03, 0.03, 0.06, 8);
        glintGeometry.rotateX(Math.PI / 2);
        const glintL = new THREE.Mesh(glintGeometry, whiteMaterial);
        glintL.position.set(-0.02, 0.02, 0.01); // Relativo ao olho
        eyeL.add(glintL);

        // Brilho Olho Direito
        const glintR = new THREE.Mesh(glintGeometry, whiteMaterial);
        glintR.position.set(-0.02, 0.02, 0.01);
        eyeR.add(glintR);

        // Bochechas
        const blushGeometry = new THREE.CylinderGeometry(0.12, 0.12, 0.02, 12);
        blushGeometry.rotateX(Math.PI / 2);
        
        const blushL = new THREE.Mesh(blushGeometry, pinkMaterial);
        blushL.position.set(-0.55, 0.65, 0.98); 
        stem.add(blushL);

        const blushR = new THREE.Mesh(blushGeometry, pinkMaterial);
        blushR.position.set(0.55, 0.65, 0.98);
        stem.add(blushR);

        // Boca (Sorriso usando um Torus cortado a meio)
        const mouthGeometry = new THREE.TorusGeometry(0.1, 0.03, 8, 12, Math.PI);
        const mouth = new THREE.Mesh(mouthGeometry, blackMaterial);
        mouth.position.set(0, 0.6, 1.0);
        mouth.rotateZ(Math.PI); // Virar o sorriso para cima
        stem.add(mouth);

        // 5. As Pernas
        const legGeometry = new THREE.CapsuleGeometry(0.25, 0.4, 4, 10);
        
        const legLeft = new THREE.Mesh(legGeometry, stemMaterial);
        legLeft.position.set(-0.4, -0.3, 0); 
        legLeft.castShadow = true;
        scene.add(legLeft);

        const legRight = new THREE.Mesh(legGeometry, stemMaterial);
        legRight.position.set(0.4, -0.3, 0); 
        legRight.castShadow = true;
        scene.add(legRight);

        // 6. Os Braços (Na diagonal)
        const armGeometry = new THREE.CapsuleGeometry(0.2, 1.0, 4, 8);
        
        // Braço Esquerdo (Caído para baixo e para fora)
        const armLeft = new THREE.Mesh(armGeometry, stemMaterial);
        // Rodar no eixo Z (positivo roda no sentido anti-horário)
        armLeft.rotation.z = Math.PI / 8; 
        // Ajustar a posição para encostar ao ombro após a rotação
        armLeft.position.set(-1, 1.7, 0); 
        armLeft.castShadow = true;
        scene.add(armLeft);

        // Braço Direito (Levantado a acenar, como na imagem)
        const armRight = new THREE.Mesh(armGeometry, stemMaterial);
        // Rodar no eixo Z para o outro lado (negativo roda no sentido horário)
        // Usar um ângulo maior (ex: -Math.PI / 4) para ficar mais levantado
        armRight.rotation.z =  Math.PI / 8; 
        // Ajustar a posição para encostar ao ombro e ficar mais alto
        armRight.position.set(1, 1, 0); 
        armRight.castShadow = true;
        scene.add(armRight);

        // 7. A Mochila (Atrás)
        const packGeometry = new THREE.BoxGeometry(1.4, 1.5, 0.6); 
        const pack = new THREE.Mesh(packGeometry, brownMaterial);
        pack.position.set(0, 1.4, -1.1); 
        pack.castShadow = true;
        scene.add(pack);

        // Alças da Mochila
        const strapGeometry = new THREE.CylinderGeometry(0.08, 0.08, 1.6, 8);
        const strapLeft = new THREE.Mesh(strapGeometry, brownMaterial);
        strapLeft.position.set(-0.6, 1.4, -0.8);
        strapLeft.rotation.x = Math.PI / 8;
        scene.add(strapLeft);

        const strapRight = new THREE.Mesh(strapGeometry, brownMaterial);
        strapRight.position.set(0.6, 1.4, -0.8);
        strapRight.rotation.x = Math.PI / 8;
        scene.add(strapRight);

        // --- Ciclo de Animação ---
        function animate(time) { 
            requestAnimationFrame(animate);
            armLeft.rotation.z = Math.PI / 8 + Math.sin(time * 0.005) * 0.4;

            controls.update(); 
            renderer.render(scene, camera);
        }

        // Inicializa a animação
        requestAnimationFrame(animate);

        // --- Ajustar redimensionamento da janela ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
