<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Orthographic vs Perspective</title>
    <style>
        body {
            margin: 0;
            display: flex;
        }

        .container {
            width: 50vw;
            height: 100vh;
            position: relative;
        }

        .label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 5px;
            font-family: sans-serif;
        }

        #ortho-container {
            border-right: 2px solid #000;
        }
    </style>
</head>

<body>
    <div id="ortho-container" class="container">
        <div class="label">Orthographic Camera</div>
    </div>
    <div id="persp-container" class="container">
        <div class="label">Perspective Camera</div>
    </div>

    <script type="module">
        import * as THREE from "https://threejs.org/build/three.module.js";

        const sceneElements = {
            sceneGraph: null,
            cameraOrtho: null,
            cameraPersp: null,
            rendererOrtho: null,
            rendererPersp: null,
        };

        const helper = {
            init: function (sceneElements) {
                sceneElements.sceneGraph = new THREE.Scene();
                const width = window.innerWidth / 2;
                const height = window.innerHeight;
                const aspect = width / height;

                // --- Perspective Camera ---
                const cameraPersp = new THREE.PerspectiveCamera(45, aspect, 0.1, 500);
                cameraPersp.position.set(0, 3, 6);
                cameraPersp.lookAt(0, 0, 0);
                sceneElements.cameraPersp = cameraPersp;

                // --- Orthographic Camera ---
                // Size of the viewing frustum (frustum size)
                const s = 2;
                const cameraOrtho = new THREE.OrthographicCamera(-s * aspect, s * aspect, s, -s, 0.1, 1000);
                cameraOrtho.position.set(0, 3, 6);
                cameraOrtho.lookAt(0, 0, 0);
                sceneElements.cameraOrtho = cameraOrtho;

                // --- Renderers ---
                sceneElements.rendererOrtho = new THREE.WebGLRenderer({ antialias: true });
                sceneElements.rendererOrtho.setSize(width, height);
                sceneElements.rendererOrtho.setPixelRatio(window.devicePixelRatio);
                sceneElements.rendererOrtho.setClearColor('rgb(255, 255, 150)', 1.0);
                sceneElements.rendererOrtho.setSize(width, height);
                // Setup shadowMap property
                sceneElements.rendererOrtho.shadowMap.enabled = true;
                sceneElements.rendererOrtho.shadowMap.type = THREE.PCFSoftShadowMap;
                document.querySelector("#ortho-container").appendChild(sceneElements.rendererOrtho.domElement);

                sceneElements.rendererPersp = new THREE.WebGLRenderer({ antialias: true });
                sceneElements.rendererPersp.setSize(width, height);
                sceneElements.rendererPersp.setPixelRatio(window.devicePixelRatio);
                sceneElements.rendererPersp.setClearColor('rgb(255, 255, 150)', 1.0);
                sceneElements.rendererPersp.setSize(width, height);
                // Setup shadowMap property
                sceneElements.rendererPersp.shadowMap.enabled = true;
                sceneElements.rendererPersp.shadowMap.type = THREE.PCFSoftShadowMap;
                document.querySelector("#persp-container").appendChild(sceneElements.rendererPersp.domElement);

                // Lights
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
                sceneElements.sceneGraph.add(ambientLight);

                const spotLight1 = new THREE.SpotLight('rgb(255, 255, 255)', 40);
                spotLight1.decay = 1;
                spotLight1.position.set(-5, 8, 0);
                sceneElements.sceneGraph.add(spotLight1);

                // Setup shadow properties for the spotlight
                spotLight1.castShadow = true;
                spotLight1.shadow.mapSize.width = 2048;
                spotLight1.shadow.mapSize.height = 2048;

                // Give a name to the spot light
                spotLight1.name = "light 1";
            },

            render: function (elements) {
                elements.rendererOrtho.render(elements.sceneGraph, elements.cameraOrtho);
                elements.rendererPersp.render(elements.sceneGraph, elements.cameraPersp);
            }
        };

        const scene = {
            loadObjects: function (sceneGraph) {

                // ************************** //
                // Create a ground plane
                // ************************** //
                const planeGeometry = new THREE.PlaneGeometry(6, 6);
                const planeMaterial = new THREE.MeshPhongMaterial({ color: 'rgb(200, 200, 200)', side: THREE.DoubleSide });
                const planeObject = new THREE.Mesh(planeGeometry, planeMaterial);
                sceneGraph.add(planeObject);

                // Change orientation of the plane using rotation
                planeObject.rotateOnAxis(new THREE.Vector3(1, 0, 0), Math.PI / 2);
                // Set shadow property
                planeObject.receiveShadow = true;


                // ************************** //
                // Create a cube
                // ************************** //
                // Cube center is at (0,0,0)
                const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
                const cubeMaterial = new THREE.MeshPhongMaterial({ color: 'rgb(255,0,0)' });
                const cubeObject = new THREE.Mesh(cubeGeometry, cubeMaterial);
                sceneGraph.add(cubeObject);

                // Set position of the cube
                // The base of the cube will be on the plane 
                cubeObject.translateY(0.5);

                // Set shadow property
                cubeObject.castShadow = true;
                cubeObject.receiveShadow = true;

                // Name
                cubeObject.name = "cube";

                // ************************** //
                // Create a sphere
                // ************************** //
                // Sphere center is at (0,0,0)
                const sphereGeometry = new THREE.SphereGeometry(0.5, 32, 32);
                const sphereMaterial = new THREE.MeshPhongMaterial({ color: 'rgb(180,180,255)' });
                const sphereObject = new THREE.Mesh(sphereGeometry, sphereMaterial);
                sceneGraph.add(sphereObject);

                // Set position of the sphere
                // Move to the left and away from (0,0,0)
                // The sphere touches the plane
                sphereObject.translateX(-1.2).translateY(0.5).translateZ(-0.5);

                // Set shadow property
                sphereObject.castShadow = true;
                sphereObject.receiveShadow = true;

                // ************************** //
                // Create a cylinder
                // ************************** //
                const cylinderGeometry = new THREE.CylinderGeometry(0.2, 0.2, 1.5, 25, 1);
                const cylinderMaterial = new THREE.MeshPhongMaterial({ color: 'rgb(200,255,150)' });
                const cylinderObject = new THREE.Mesh(cylinderGeometry, cylinderMaterial);
                sceneGraph.add(cylinderObject);

                // Set position of the cylinder
                // Move to the right and towards the camera
                // The base of the cylinder is on the plane
                cylinderObject.translateX(0.5).translateY(0.75).translateZ(1.5);

                // Set shadow property
                cylinderObject.castShadow = true;
                cylinderObject.receiveShadow = true;
            }
        };

        function animate() {
            helper.render(sceneElements);
            requestAnimationFrame(animate);
        }

        helper.init(sceneElements);
        scene.loadObjects(sceneElements.sceneGraph);
        animate();

        window.addEventListener('resize', () => {
            const width = window.innerWidth / 2;
            const height = window.innerHeight;
            const aspect = width / height;

            sceneElements.cameraPersp.aspect = aspect;
            sceneElements.cameraPersp.updateProjectionMatrix();

            const s = 10;
            sceneElements.cameraOrtho.left = -s * aspect;
            sceneElements.cameraOrtho.right = s * aspect;
            sceneElements.cameraOrtho.top = s;
            sceneElements.cameraOrtho.bottom = -s;
            sceneElements.cameraOrtho.updateProjectionMatrix();

            sceneElements.rendererOrtho.setSize(width, height);
            sceneElements.rendererPersp.setSize(width, height);
        });
    </script>
</body>

</html>
