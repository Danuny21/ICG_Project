<head>

	<title>three.js example 05 &mdash; Lighting and Animation</title>

	<meta charset="utf-8">

	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<style>
		body {

			background-color: #ffffff;

			/* To use the complete page */

			margin: 0px;

			overflow: hidden;
		}
	</style>

</head>

<body>

	<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

	<script type="importmap">
		{
    		"imports": {
     			 "three": "https://threejs.org/build/three.module.js"
    		}
  		}
	</script>

	<script type="module">

		import * as THREE from 'three';

function init() {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111); // Darker background to see light effects

    // --- MODELING (Upgraded to Standard Materials) ---
    const cube_geometry = new THREE.BoxGeometry(50, 50, 50);
    
    // Cube 1 (Green)
    const green_material = new THREE.MeshStandardMaterial({ color: 0x00ff00, roughness: 0.3 });
    const cube_1 = new THREE.Mesh(cube_geometry, green_material);
    cube_1.position.x = -100;
    scene.add(cube_1);

    // Cube 2 (Red)
    const red_material = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.5 });
    const cube_2 = new THREE.Mesh(cube_geometry, red_material);
    cube_2.position.x = 100;
    scene.add(cube_2);

    // Sphere (Blue)
    const sphere_geometry = new THREE.SphereGeometry(30, 32, 32);
    const blue_material = new THREE.MeshStandardMaterial({ color: 0x0000ff, roughness: 0.1 });
    const sphere = new THREE.Mesh(sphere_geometry, blue_material);
    sphere.position.y = -75;
    scene.add(sphere);

    // Cone (Yellow)
    const cone_geometry = new THREE.ConeGeometry(45, 90, 32);
    const yellow_material = new THREE.MeshStandardMaterial({ color: 0xffff00 });
    const cone = new THREE.Mesh(cone_geometry, yellow_material);
    cone.position.y = 80;
    scene.add(cone);

    // --- LIGHTING (The key to 3D realism) ---
    const mainLight = new THREE.PointLight(0xffffff, 100000); // Bright white light
    mainLight.position.set(50, 100, 150);
    scene.add(mainLight);

    const ambientLight = new THREE.AmbientLight(0x404040, 2); // Soft overall light
    scene.add(ambientLight);

    // --- CAMERA ---
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 300;
    camera.lookAt(scene.position);

    // --- RENDERER ---
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- WINDOW RESIZING ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        // Add some motion
        cube_1.rotation.y += 0.01;
        cube_2.rotation.x += 0.01;
        
        // Make the sphere bob up and down
        sphere.position.y = -75 + Math.sin(Date.now() * 0.002) * 10;

        // Make the cone spin
        cone.rotation.y += 0.02;

        renderer.render(scene, camera);
    }

    animate();
}

window.onload = init;
	</script>

</body>

</html>
