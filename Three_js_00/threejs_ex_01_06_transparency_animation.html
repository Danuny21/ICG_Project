<head>

	<title>three.js example 06 &mdash; Transparency and Animation</title>

	<meta charset="utf-8">

	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<style>
		body {

			background-color: #ffffff;

			/* To use the complete page */

			margin: 0px;

			overflow: hidden;
		}
	</style>

</head>

<body>

	<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

	<script type="importmap">
		{
    		"imports": {
     			 "three": "https://threejs.org/build/three.module.js"
    		}
  		}
	</script>

	<script type="module">

		import * as THREE from 'three';

        function init() {

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505); // Deep black background

    // --- GEOMETRIES ---
    const cube_geometry = new THREE.BoxGeometry(40, 40, 40);
    const sphere_geometry = new THREE.SphereGeometry(25, 32, 32);
    const cone_geometry = new THREE.ConeGeometry(30, 60, 32);

    // --- MATERIALS WITH TRANSPARENCY ---
    // Opacity: 1.0 = Solid, 0.5 = Semi-transparent, 0.2 = Ghost-like
    const green_mat = new THREE.MeshStandardMaterial({ 
        color: 0x00ff00, transparent: true, opacity: 0.8, roughness: 0 
    });
    const red_mat = new THREE.MeshStandardMaterial({ 
        color: 0xff0000, transparent: true, opacity: 0.4, metalness: 0.8 
    });
    const blue_mat = new THREE.MeshStandardMaterial({ 
        color: 0x0000ff, transparent: true, opacity: 0.6, roughness: 0.2 
    });
    const yellow_mat = new THREE.MeshStandardMaterial({ 
        color: 0xffff00, transparent: true, opacity: 0.3 
    });

    // --- MESHES ---
    const cube1 = new THREE.Mesh(cube_geometry, green_mat);
    const cube2 = new THREE.Mesh(cube_geometry, red_mat);
    const sphere = new THREE.Mesh(sphere_geometry, blue_mat);
    const cone = new THREE.Mesh(cone_geometry, yellow_mat);

    const models = [cube1, cube2, sphere, cone];
    models.forEach(m => scene.add(m));

    // --- LIGHTING ---
    const pLight = new THREE.PointLight(0xffffff, 80000);
    pLight.position.set(0, 100, 100);
    scene.add(pLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    // --- CAMERA ---
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 350;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- THE DANCE LOGIC ---
    function animate() {
        requestAnimationFrame(animate);

        const time = Date.now() * 0.001; // Current time in seconds
        const radius = 120; // How wide the circle is

        models.forEach((mesh, index) => {
            // Offset each object by 90 degrees (PI / 2) so they don't overlap
            const angle = time + (index * (Math.PI / 2));
            
            // Circular motion math
            mesh.position.x = Math.cos(angle) * radius;
            mesh.position.y = Math.sin(angle) * (radius * 0.5); // Elliptical "dance"
            mesh.position.z = Math.sin(angle) * radius;

            // Make them spin while they orbit
            mesh.rotation.x += 0.02;
            mesh.rotation.y += 0.02;
        });

        renderer.render(scene, camera);
    }

    animate();
}

window.onload = init;

	</script>

</body>

</html>
