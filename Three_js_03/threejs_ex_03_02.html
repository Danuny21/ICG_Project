<head>

	<title>three.js example 01 &mdash; Some Models</title>

	<meta charset="utf-8">

	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<style>
		body {

			background-color: #ffffff;

			/* To use the complete page */

			margin: 0px;

			overflow: hidden;
		}
	</style>

</head>

<body>

	<!-- The library --- Can be a local version -->

	<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

	<script type="importmap">
		{
    		"imports": {
     			 "three": "https://threejs.org/build/three.module.js"
    		}
  		}
	</script>

	<!-- Javascript code that runs the Three.js example -->

	<script type="module">

		import * as THREE from 'three';

		function createTree(placement={ x: 0, y: 0, z: 0 }, scale={ x: 1, y: 1, z: 1 }) {

			// Creating a model by grouping basic geometries

			// Cylinder centered at the origin

			const cylinderRadius = 5;

			const cylinderHeight = 20;

			const cylinderGeometry = new THREE.CylinderGeometry(cylinderRadius, cylinderRadius, cylinderHeight, 32);

			const redMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000, shininess: 100 });

			const cylinder = new THREE.Mesh(cylinderGeometry, redMaterial);
			cylinder.castShadow = true;
			cylinder.receiveShadow = true;

			// Move base of the cylinder to y = 0

			cylinder.position.y = cylinderHeight / 2.0;

			// Cone

			const baseConeRadius = 10;

			const coneHeight = 30;

			const coneGeometry = new THREE.ConeGeometry(baseConeRadius, coneHeight, 32);

			const greenMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00, shininess: 100 });

			const cone = new THREE.Mesh(coneGeometry, greenMaterial);
			cone.castShadow = true;
			cone.receiveShadow = true;

			// Move base of the cone to the top of the cylinder

			cone.position.y = cylinderHeight + coneHeight / 2.0;

			// Tree

			const tree = new THREE.Group();
			tree.position.set(placement.x, placement.y, placement.z);
			tree.scale.set(scale.x, scale.y, scale.z);

			tree.add(cylinder);
			tree.add(cone);

			return tree;
		}

		// Once everything is loaded, run this function

		function init() {

			// The SCENE

			const scene = new THREE.Scene();

			// Plane Helper to represent the ZOX plane

			const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0));
			const planeHelper = new THREE.PlaneHelper(plane, 200, 0xaaaaaa);
			scene.add(planeHelper);
			planeHelper.receiveShadow = true;

			// The coordinate axes

			const axes = new THREE.AxesHelper(15);

			scene.add(axes);

			// Adding models to the scene

			const tree_1 = createTree({ x: -50, y: 0, z: -25 });
			const tree_2 = createTree({ x: -50, y: 0, z: 25 }, { x: 1.5, y: 1, z: 1.5 });
			const tree_3 = createTree({ x: 50, y: 0, z: 25 }, { x: 1, y: 0.75, z: 1 });
			const tree_4 = createTree({ x: 50, y: 0, z: -25 }, { x: 1, y: 2, z: 1 });


			scene.add(tree_1);
			scene.add(tree_2);
			scene.add(tree_3);
			scene.add(tree_4);

			// A SPOTLIGHT
			const spotlight = new THREE.SpotLight(0xffffff, 100000, 0);
			spotlight.position.set(-100, 60, 0);
			spotlight.castShadow = true;
			scene.add(spotlight);

			// A AMBIENT LIGHT
			const ambientLight = new THREE.AmbientLight(0x404040, 10);
			scene.add(ambientLight);

			// The CAMERA --- A camera is added to the scene

			// --- Where the viewer is and how he is looking at the scene

			const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 400);

			camera.position.y = 50;

			camera.position.z = 150;

			// Point the camera to the center of the scene

			camera.lookAt(scene.position);

			scene.add(camera)

			// The RENDERER --- To display the scene on the Web page

			const renderer = new THREE.WebGLRenderer({ antialias: true });

			renderer.setClearColor(new THREE.Color(0xffffff));

			renderer.setPixelRatio(window.devicePixelRatio);

			renderer.setSize(window.innerWidth, window.innerHeight);

			// Enable shadows
			renderer.shadowMap.enabled = true;

			// Add the output of the renderer

			document.body.appendChild(renderer.domElement);

			// Render the scene

			renderer.render(scene, camera);
		}

		window.onload = init

	</script>

</body>

</html>
