<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> 3D scene - Lights, Shadows & Cubes </title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
          "imports": {
            "three": "https://threejs.org/build/three.module.js",
            "three/addons/": "https://threejs.org/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";

        const sceneElements = {
            sceneGraph: null,
            camera: null,
            control: null,
            renderer: null,
        };

        const helper = {
            initEmptyScene: function (sceneElements) {
                sceneElements.sceneGraph = new THREE.Scene();

                const width = window.innerWidth;
                const height = window.innerHeight;
                const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 500);
                sceneElements.camera = camera;
                camera.position.set(0, 10, 20);
                camera.lookAt(0, 0, 0);

                const ambientLight = new THREE.AmbientLight('rgb(255, 255, 255)', 0.2);
                sceneElements.sceneGraph.add(ambientLight);

                // Luz principal controlável
                const mainLight = new THREE.PointLight('rgb(255, 255, 255)', 150);
                mainLight.position.set(5, 12, 5);
                mainLight.castShadow = true;
                mainLight.name = "mainLight";
                sceneElements.sceneGraph.add(mainLight);

                // Luzes animadas
                const light_1 = new THREE.PointLight('rgb(255, 0, 0)', 60);
                light_1.position.set(10, 5, 2);
                light_1.name = "light 1";
                light_1.castShadow = true;
                sceneElements.sceneGraph.add(light_1);

                const light_2 = new THREE.PointLight('rgb(0, 255, 0)', 60);
                light_2.position.set(-7.5, 5, 2);
                light_2.name = "light 2";
                light_2.castShadow = true;
                sceneElements.sceneGraph.add(light_2);

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                sceneElements.renderer = renderer;
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setClearColor('rgb(30, 30, 50)', 1.0);
                renderer.setSize(width, height);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;

                const htmlElement = document.querySelector("#Tag3DScene");
                htmlElement.appendChild(renderer.domElement);
                sceneElements.control = new OrbitControls(camera, renderer.domElement);
            },

            render: function (sceneElements) {
                sceneElements.renderer.render(sceneElements.sceneGraph, sceneElements.camera);
            },
        };

        const scene = {
            load3DObjects: function (sceneGraph) {
                // Geometrias e Materiais
                const sphereGeom = new THREE.SphereGeometry(0.8, 32, 32);
                const cubeGeom = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshPhongMaterial({ color: 'rgb(200,200,200)' });

                // --- ESFERAS E CUBOS ---
                const positions = [-4, 0, 4]; // X positions para Esquerda, Centro, Direita
                
                positions.forEach((x, index) => {
                    // Adicionar Esfera
                    const sphere = new THREE.Mesh(sphereGeom, material);
                    sphere.position.set(x, 0, 0);
                    sphere.castShadow = true;
                    sphere.receiveShadow = true;
                    sceneGraph.add(sphere);

                    // Adicionar Cubo acima da esfera correspondente
                    const cube = new THREE.Mesh(cubeGeom, new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff }));
                    cube.position.set(x, 3, 0); // Altura y = 3
                    cube.castShadow = true;
                    cube.receiveShadow = true;
                    cube.name = "cube_" + index; // Nome para animar depois
                    sceneGraph.add(cube);
                });

                // Chão
                const plane = new THREE.Mesh(
                    new THREE.PlaneGeometry(50, 50),
                    new THREE.MeshPhongMaterial({ color: 'rgb(80, 80, 80)', side: THREE.DoubleSide })
                );
                plane.rotation.x = Math.PI / 2;
                plane.position.y = -0.8;
                plane.receiveShadow = true;
                sceneGraph.add(plane);
            }
        };

        function changeLightType(type) {
            const oldLight = sceneElements.sceneGraph.getObjectByName("mainLight");
            const pos = oldLight.position.clone();
            sceneElements.sceneGraph.remove(oldLight);

            let newLight;
            if (type === 'point') newLight = new THREE.PointLight('rgb(255, 255, 255)', 150);
            else if (type === 'directional') newLight = new THREE.DirectionalLight('rgb(255, 255, 255)', 2);
            else if (type === 'spot') {
                newLight = new THREE.SpotLight('rgb(255, 255, 255)', 300);
                newLight.angle = Math.PI / 6;
            }

            newLight.name = "mainLight";
            newLight.position.copy(pos);
            newLight.castShadow = sceneElements.renderer.shadowMap.enabled; 
            sceneElements.sceneGraph.add(newLight);
        }

        function computeFrame(time) {
            // Rotação das Luzes
            const light_1 = sceneElements.sceneGraph.getObjectByName("light 1");
            const light_2 = sceneElements.sceneGraph.getObjectByName("light 2");
            if (light_1) {
                light_1.position.x = 10 * Math.cos(time * 0.001);
                light_1.position.z = 10 * Math.sin(time * 0.001);
            }
            if (light_2) {
                light_2.position.x = 8 * Math.cos(-time * 0.0005);
                light_2.position.z = 8 * Math.sin(-time * 0.0005);
            }

            // ANIMAÇÃO DOS CUBOS (Velocidades diferentes)
            const cube0 = sceneElements.sceneGraph.getObjectByName("cube_0");
            const cube1 = sceneElements.sceneGraph.getObjectByName("cube_1");
            const cube2 = sceneElements.sceneGraph.getObjectByName("cube_2");

            if (cube0) cube0.rotation.y = time * 0.001;  // Lento
            if (cube1) cube1.rotation.y = time * 0.003;  // Médio
            if (cube2) cube2.rotation.y = time * 0.005;  // Rápido

            helper.render(sceneElements);
            requestAnimationFrame(computeFrame);
        }

        function onDocumentKeyDown(event) {
            switch (event.key) {
                case "1": changeLightType('point'); break;
                case "2": changeLightType('directional'); break;
                case "3": changeLightType('spot'); break;
                case "x": 
                case "X":
                    sceneElements.renderer.shadowMap.enabled = !sceneElements.renderer.shadowMap.enabled;
                    sceneElements.sceneGraph.traverse((obj) => { if (obj.material) obj.material.needsUpdate = true; });
                    break;
            }
        }

        function init() {
            helper.initEmptyScene(sceneElements);
            scene.load3DObjects(sceneElements.sceneGraph);
            document.addEventListener('keydown', onDocumentKeyDown);
            requestAnimationFrame(computeFrame);
        }

        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            sceneElements.camera.aspect = width / height;
            sceneElements.camera.updateProjectionMatrix();
            sceneElements.renderer.setSize(width, height);
        });

        init();
    </script>
</head>
<body>
    <div id="Tag3DScene"></div>
    <div style="position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 10px; font-family: sans-serif; pointer-events: none;">
        <b>Controles:</b><br>
        [1] Point Light | [2] Directional Light | [3] Spot Light<br>
        [X] Toggle Sombras<br>
        <i>Cubos rodam em velocidades diferentes.</i>
    </div>
</body>
</html>
