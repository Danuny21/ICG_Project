<!DOCTYPE html>

<html lang="en">

<head>

	<title>three.js example 01 &mdash; 3 boxes</title>

	<meta charset="utf-8">

	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<style>
		body {

			background-color: #ffffff;

			/* To use the complete page */

			margin: 0px;

			overflow: hidden;
		}
	</style>

</head>

<body>

	<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

	<script type="importmap">
		{
    		"imports": {
     			 "three": "https://threejs.org/build/three.module.js"
    		}
  		}
	</script>

	<script type="module">

		import * as THREE from 'three';

		// Once everything is loaded, run this function

		function init() {

			// The SCENE

			const scene = new THREE.Scene();

			// LIGHTING
			// Ambient light provides overall illumination
			const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
			scene.add(ambientLight);

			// Directional light for better shape perception
			const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
			directionalLight.position.set(50, 100, 50);
			scene.add(directionalLight);

			// Point light for more dynamic lighting
			const pointLight = new THREE.PointLight(0xffffff, 0.5);
			pointLight.position.set(-50, 50, 50);
			scene.add(pointLight);

			// Camera
			const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 1000);

			camera.position.z = 100;
			camera.position.y = 100;

			// Point the camera to the center of the scene

			camera.lookAt(scene.position);

			scene.add(camera)


			for (let i = 0; i < 3; i++) {
				for (let j = 0; j < 3; j++) {
					for (let k = 0; k < 3; k++) {

						//Create a cube and its wireframe, and add them to the scene
						const box = createCube(scene);

						// Position the cubes in a grid
						box[0].position.x = (i - 1) * 25; 
						box[1].position.x = (i - 1) * 25;
						box[0].position.y = (j - 1) * 25; 
						box[1].position.y = (j - 1) * 25;
						box[0].position.z = (k - 1) * 25; 
						box[1].position.z = (k - 1) * 25;

						// Add the cubes and their wireframes to the scene
						scene.add(box[0]);
						scene.add(box[1]);
					}

				}
			}

			function createCube(scene) {
				// Create a box geometry
				const box_geometry = new THREE.BoxGeometry(20, 20, 20);
				// Create materials for the boxes

				// Create the first box and add it to the scene
				const color = new THREE.Color(Math.random(), Math.random(), Math.random());
				const material = new THREE.MeshPhongMaterial({ color: color, wireframe: false });
				const box1 = new THREE.Mesh(box_geometry, material);

				// Add the edges of the first box to the scene
				const edges_material = new THREE.LineBasicMaterial({ color: 0x000000 });
				const box1_wireframe = new THREE.WireframeGeometry(box_geometry);
				const box1_wireframe_mesh = new THREE.LineSegments(box1_wireframe, edges_material);
			
				return [box1, box1_wireframe_mesh];
			}



			// The RENDERER --- To display the scene on the Web page

			const renderer = new THREE.WebGLRenderer({ antialias: true });

			renderer.setClearColor(new THREE.Color(0xffffff));

			renderer.setPixelRatio(window.devicePixelRatio);

			renderer.setSize(window.innerWidth, window.innerHeight);

			// Add the output of the renderer

			document.body.appendChild(renderer.domElement);

			// Render the scene

			renderer.render(scene, camera);
		}



		window.onload = init

	</script>

</body>

</html>
