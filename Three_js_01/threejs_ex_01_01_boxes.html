<!DOCTYPE html>

<html lang="en">

<head>

	<title>three.js example 01 &mdash; 3 boxes</title>

	<meta charset="utf-8">

	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<style>
		body {

			background-color: #ffffff;

			/* To use the complete page */

			margin: 0px;

			overflow: hidden;
		}
	</style>

</head>

<body>

	<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

	<script type="importmap">
		{
    		"imports": {
     			 "three": "https://threejs.org/build/three.module.js"
    		}
  		}
	</script>

	<script type="module">

		import * as THREE from 'three';

		// Once everything is loaded, run this function

		function init() {

			// The SCENE

			const scene = new THREE.Scene();

			// Add an axes helper to the scene
			const axesHelper = new THREE.AxesHelper(50);
			scene.add( axesHelper );

			// LIGHTING
			// Ambient light provides overall illumination
			const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
			scene.add(ambientLight);

			// Directional light for better shape perception
			const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
			directionalLight.position.set(50, 100, 50);
			scene.add(directionalLight);

			// Point light for more dynamic lighting
			const pointLight = new THREE.PointLight(0xffffff, 0.5);
			pointLight.position.set(-50, 50, 50);
			scene.add(pointLight);


			// The MODELS --- Boxes are added to the scene

			// The material for the edges of the boxes
			const edges_material = new THREE.LineBasicMaterial({ color: 0x000000 });
			const wireframe_material = new THREE.MeshBasicMaterial({ color: 0xffffff});

			// A box centred on the origin, with given width, height and depth

			const cube_geometry = new THREE.BoxGeometry(20, 20, 20);

			// With a constant color

			const green_material = new THREE.MeshPhongMaterial({ color: 0x00ff00 , wireframe: false});


			// The cube model: shape + material

			const cube = new THREE.Mesh(cube_geometry, green_material);

			// Add the cube to the scene

			scene.add(cube);

			// Add a wireframe cube to the scene
			const cube_wireframe = new THREE.WireframeGeometry(cube_geometry);
			const cube_wireframe_mesh = new THREE.LineSegments(cube_wireframe, edges_material);

			scene.add(cube_wireframe_mesh);

			// A longer box --- What are the arguments?
			// 60 is the width, 20 the height, 20 the depth, and 3 is the number of segments in each direction
			const box1_geometry = new THREE.BoxGeometry(60, 20, 20, 3, 3, 3);

			// With a constant color

			const red_material = new THREE.MeshPhongMaterial({ color: 0xff0000});
			// The box 

			const box1 = new THREE.Mesh(box1_geometry, red_material);

			// Move it to the left

			box1.position.x = -60;

			scene.add(box1);

			// Add the edges of the box to the scene
			const box1_edges = new THREE.EdgesGeometry(box1_geometry);
			const box1_edges_mesh = new THREE.LineSegments(box1_edges, edges_material);
			box1_edges_mesh.position.x = -60;

			scene.add(box1_edges_mesh);

			// Another box 

			const box2_geometry = new THREE.BoxGeometry(60, 20, 60, 5, 5, 5);

			// With a constant color

			const blue_material = new THREE.MeshPhongMaterial({ color: 0x0000ff});

			// The box 

			const box2 = new THREE.Mesh(box2_geometry, blue_material);

			// Move it 

			box2.position.x = +60;
			box2.position.z = -20;

			scene.add(box2);

			// Add the edges of the box to the scene
			const box2_wireframe = new THREE.WireframeGeometry(box2_geometry);
			const box2_wireframe_mesh = new THREE.LineSegments(box2_wireframe, edges_material);
			
			box2_wireframe_mesh.position.x = +60;
			box2_wireframe_mesh.position.z = -20;

			scene.add(box2_wireframe_mesh);

			// The CAMERA --- A camera is added to the scene
			// 			  --- Where the viewer is and how he is looking at the scene

			const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 1000);

			camera.position.z = 100;
			camera.position.y = 50;
			camera.position.x = 0;

			// Point the camera to the center of the scene

			camera.lookAt(scene.position);

			scene.add(camera)

			// The RENDERER --- To display the scene on the Web page

			const renderer = new THREE.WebGLRenderer({ antialias: true });

			renderer.setClearColor(new THREE.Color(0xffffff));

			renderer.setPixelRatio(window.devicePixelRatio);

			renderer.setSize(window.innerWidth, window.innerHeight);

			// Add the output of the renderer

			document.body.appendChild(renderer.domElement);

			// Render the scene

			renderer.render(scene, camera);
		}

		window.onload = init

	</script>

</body>

</html>
