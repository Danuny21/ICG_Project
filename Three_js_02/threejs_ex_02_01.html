<!DOCTYPE html>

<html lang="en">

<head>

	<title>three.js example</title>

	<meta charset="utf-8">

	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<style>
		body {

			background-color: #ffffff;

			/* To use the complete page */

			margin: 0px;

			overflow: hidden;
		}
	</style>

</head>

<body>

	<!-- Div which will hold the renderer output -->

	<div id="WebGL-output"> </div>

	<!-- The library -->

	<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

	<script type="importmap">
		{
    		"imports": {
     			 "three": "https://threejs.org/build/three.module.js",
     			 "three/addons/": "https://threejs.org/examples/jsm/"
    		}
  		}
	</script>

	<!-- Javascript code that runs the Three.js example -->

	<script type="module">

		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

		// Global variables
		let camera;
		let renderer;
		let controls;

		// Once everything is loaded, run this function

		function init() {

			// The SCENE

			const scene = new THREE.Scene();

			// The GROUND plane

			const planeGeometry = new THREE.PlaneGeometry(60, 20);
			const planeMaterial = new THREE.MeshPhongMaterial({ color: 0xcccccc, shininess: 100 });
			const plane = new THREE.Mesh(planeGeometry, planeMaterial);

			// Rotate and position the plane

			plane.rotation.x = -0.5 * Math.PI; // DONE: What happens if you comment out this line of code? FIca na vertical
			plane.position.x = 15;
			plane.position.y = 0;
			plane.position.z = 0;

			// Add to the scene

			scene.add(plane);

			// Add coordinate AXIS to the scene

			const axes = new THREE.AxesHelper(20);

			// Add a GRID to the scene
			//const gridHelper = new THREE.GridHelper( 30, 20 );
			//scene.add( gridHelper );

			scene.add(axes);

			// A CUBE

			const cubeGeometry = new THREE.BoxGeometry(3, 3, 3);
			const cubeMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000, shininess: 120 });
			const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);

			// Position the cube and add it to the scene
			// DONE: What happens if you comment out the next three lines of code? Fica no centro da cena
			cube.position.x = -7;
			cube.position.y = 1.5;
			cube.position.z = -3;

			scene.add(cube);

			// A SPHERE
			const sphereGeometry = new THREE.SphereGeometry(3, 12, 12);
			const sphereMaterial = new THREE.MeshPhongMaterial({ color: 0x7777ff, shininess: 150 });
			const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);

			// Position the sphere and add it to the scene
			// DONE: What happens if you comment out the next three lines of code? Fica no centro da cena
			sphere.position.x = 10;
			sphere.position.y = 3;
			sphere.position.z = 5;

			// DONE; What happens if you increase or decrease the radius of the sphere? Aumenta ou diminui o tamanho da esfera

			// add the sphere to the scene
			scene.add(sphere);


			// A CYLINDER
			const cylinderGeometry = new THREE.CylinderGeometry(2, 2, 5, 12);
			const cylinderMaterial = new THREE.MeshPhongMaterial({ color: 0xffff00, shininess: 140 });
			const cylinder = new THREE.Mesh(cylinderGeometry, cylinderMaterial);

			cylinder.position.z = -2;
			cylinder.position.y = 2.5;

			// Position the cylinder and add it to the scene
			scene.add(cylinder);


			// CONE

			const geometry = new THREE.ConeGeometry( 3, 10, 10 );
			const material = new THREE.MeshPhongMaterial( { color: 0x00ff00, shininess: 110 } );
			const cone = new THREE.Mesh(geometry, material );

			cone.position.x = 18;
			cone.position.y = 7;

			scene.add( cone );

			// CYLINDER

			const new_cylinderGeometry = new THREE.CylinderGeometry(1, 3, 10, 12);
			const new_cylinderMaterial = new THREE.MeshPhongMaterial({ color: 0x0000ff, shininess: 130 });
			const new_cylinder = new THREE.Mesh(new_cylinderGeometry, new_cylinderMaterial);

			new_cylinder.position.x = 25;
			new_cylinder.position.y = 5;
			new_cylinder.position.z = 6;

			scene.add(new_cylinder);

			// A TORUS

			const torusGeometry = new THREE.TorusGeometry(4, 1.5, 20, 20);
			const torusMaterial = new THREE.MeshPhongMaterial({ color: 0xff00ff, shininess: 200 });
			const torus = new THREE.Mesh(torusGeometry, torusMaterial);

			torus.position.x = 10;
			torus.position.y = 5;
			torus.position.z = -3;

			scene.add(torus);

			// A SPOTLIGHT
			const spotlight = new THREE.SpotLight(0xffffff, 10000, 0);
			spotlight.position.set(-40, 60, -10);
			scene.add(spotlight);

			// A AMBIENT LIGHT
			const ambientLight = new THREE.AmbientLight(0x404040, 10);
			scene.add(ambientLight);

			// The CAMERA

			// --- Where the viewer is and how he is looking at the scene

			const width = window.innerWidth;
			const height = window.innerHeight;
			camera = new THREE.OrthographicCamera(width / -20, width / 20, height / 20, height / -20, 1, 1000);
			//const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);

			// Position the camera

			camera.position.x = -20;
			camera.position.y = 20;
			camera.position.z = 20;
			

			// Point the camera to the center of the scene

			camera.lookAt(scene.position);

			scene.add(camera)

			// The RENDERER --- To display the scene on the Web page

			renderer = new THREE.WebGLRenderer({ antialias: true });

			renderer.setClearColor(new THREE.Color(0xffffff));

			renderer.setPixelRatio(window.devicePixelRatio);

			renderer.setSize(window.innerWidth, window.innerHeight);

			renderer.shadowMap.enabled = true; 
			plane.receiveShadow = true; 
			cone.castShadow = true; 
			cone.receiveShadow = true;
			cylinder.castShadow = true;
			cylinder.receiveShadow = true;
			new_cylinder.castShadow = true;
			new_cylinder.receiveShadow = true;
			sphere.castShadow = true;
			sphere.receiveShadow = true;
			cube.castShadow = true;
			cube.receiveShadow = true;
			torus.castShadow = true;
			torus.receiveShadow = true;
			spotlight.castShadow = true;
			ambientLight.castShadow = true;

			// Add the output of the renderer to the html element

			document.getElementById("WebGL-output").appendChild(renderer.domElement);

			// --- INTERACTION ---
			controls = new OrbitControls(camera, renderer.domElement);
			controls.enableDamping = true;
			controls.dampingFactor = 0.05;

			// Render the scene

			renderer.render(scene, camera);
			var step = 0;
			// Update model features and render the scene
			renderScene()

			function renderScene() {
				// Rotate the cube around its axes
				cube.rotation.x += 0.02;
				cube.rotation.y += 0.02;
				cube.rotation.z += 0.02;

				step += 0.04;
				// Bounce the sphere up and down
				sphere.position.x = 20 + (10 * Math.cos(step));
				sphere.position.y = 6 + (10 * Math.abs(Math.sin(step)));

				torus.rotation.x += 0.1;
				cylinder.position.z = -2 + (3 * Math.sin(step));

				camera.position.x = -30 + (10 * Math.cos(step));
				camera.position.z = 30 + (10 * Math.sin(step));
				camera.position.y = 60 + (5 * Math.cos(step));
				camera.lookAt(scene.position);

				// Update controls damping
				controls.update();

				// Render using requestAnimationFrame
				requestAnimationFrame(renderScene);
				renderer.render(scene, camera);
			}
		}

		function onResize() {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		}

		window.addEventListener('resize', onResize, false);
		window.onload = init

	</script>

</body>

</html>
