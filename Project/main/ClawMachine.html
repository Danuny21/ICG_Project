<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Three.js Claw Machine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; }
        #controles {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none; /* Deixa o rato passar */
        }
        .key { display: inline-block; padding: 4px 8px; border: 1px solid white; border-radius: 4px; background: #333; font-weight: bold; margin: 0 2px;}
    </style>
    
    <script type="importmap">
        {
          "imports": {
            "three": "https://threejs.org/build/three.module.js",
            "three/addons/": "https://threejs.org/examples/jsm/"
          }
        }
    </script>
</head>
<body>

    <div id="controles">
        <h3>Como Jogar:</h3>
        <p>
            <span class="key">↑</span>
            <span class="key">↓</span>
            <span class="key">←</span> 
            <span class="key">→</span> 
            : Mover Garra
        </p>
        <p>
            <span class="key">ESPAÇO</span> 
            : Tentar apanhar
        </p>
    </div>

    <script type="module" src="./clawMain.js"></script>

</body>
</html>
