<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Three.js - Normals Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "three": "https://threejs.org/build/three.module.js",
            "three/addons/": "https://threejs.org/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { VertexNormalsHelper } from 'three/addons/helpers/VertexNormalsHelper.js';

        const sceneElements = {
            sceneGraph: null, camera: null, renderer: null, control: null
        };

        const helper = {
            initEmptyScene: function (elements) {
                elements.sceneGraph = new THREE.Scene();
                elements.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
                elements.camera.position.set(0, 5, 15);

                const light = new THREE.DirectionalLight(0xffffff, 2);
                light.position.set(5, 10, 7);
                elements.sceneGraph.add(light);
                elements.sceneGraph.add(new THREE.AmbientLight(0xffffff, 0.3));

                elements.renderer = new THREE.WebGLRenderer({ antialias: true });
                elements.renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(elements.renderer.domElement);
                elements.control = new OrbitControls(elements.camera, elements.renderer.domElement);
            },
            render: function (elements) {
                elements.renderer.render(elements.sceneGraph, elements.camera);
            }
        };

        const scene = {
            load3DObjects: function (sceneGraph) {
                // 1. SMOOTH SPHERE (Indexed)
                // Vertices are shared, so normals are averaged at the corners
                const geoSmooth = new THREE.SphereGeometry(3, 12, 8);
                const matSmooth = new THREE.MeshPhongMaterial({ color: 0x00ffaa, flatShading: false });
                const sphereSmooth = new THREE.Mesh(geoSmooth, matSmooth);
                sphereSmooth.position.x = -8;
                sceneGraph.add(sphereSmooth);

                // Helper for Smooth Sphere (Blue lines)
                const helperSmooth = new VertexNormalsHelper(sphereSmooth, 0.8, 0x00ffff);
                sceneGraph.add(helperSmooth);

                // 2. FLAT SPHERE (Non-Indexed)
                // Each triangle has its own vertices, so normals point straight out from the face
                let geoFlat = new THREE.SphereGeometry(3, 12, 8);
                geoFlat = geoFlat.toNonIndexed(); // Explode the shared vertices
                // Compute the Vertex Normals
                geoFlat.computeVertexNormals();
                const matFlat = new THREE.MeshPhongMaterial({ color: 0xffaa00, flatShading: false });
                const sphereFlat = new THREE.Mesh(geoFlat, matFlat);
                sphereFlat.position.x = -2.5;
                sceneGraph.add(sphereFlat);

                // Helper for Flat Sphere (Red/Orange lines)
                // Because it is non-indexed, these represent the Face Normals
                const helperFlat = new VertexNormalsHelper(sphereFlat, 0.8, 0xff6600);
                sceneGraph.add(helperFlat);

                // 3. SMOOTH CYLINDER (Indexed)
                const geoCylSmooth = new THREE.CylinderGeometry(2, 2, 6, 32, 1, false);
                const matCylSmooth = new THREE.MeshPhongMaterial({ color: 0x00aaff, flatShading: false });
                const cylSmooth = new THREE.Mesh(geoCylSmooth, matCylSmooth);
                cylSmooth.position.x = 3.5;
                sceneGraph.add(cylSmooth);
                // Helper for Smooth Cylinder
                const helperCylSmooth = new VertexNormalsHelper(cylSmooth, 0.8, 0x00ffff);
                sceneGraph.add(helperCylSmooth);

                // 4. FLAT CYLINDER (Non-Indexed)
                let geoCylFlat = new THREE.CylinderGeometry(2, 2, 6, 32, 1, false);
                geoCylFlat = geoCylFlat.toNonIndexed();
                geoCylFlat.computeVertexNormals();
                const matCylFlat = new THREE.MeshPhongMaterial({ color: 0xff6600, flatShading: true });
                const cylFlat = new THREE.Mesh(geoCylFlat, matCylFlat);
                cylFlat.position.x = 8;
                sceneGraph.add(cylFlat);
                // Helper for Flat Cylinder
                const helperCylFlat = new VertexNormalsHelper(cylFlat, 0.8, 0xff6600);
                sceneGraph.add(helperCylFlat);
            }
        };

        function computeFrame() {
            helper.render(sceneElements);
            requestAnimationFrame(computeFrame);
        }

        function init() {
            helper.initEmptyScene(sceneElements);
            scene.load3DObjects(sceneElements.sceneGraph);
            computeFrame();
        }

        init();
    </script>
</head>

<body></body>

</html>
