<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Three.js - Debugging BufferGeometry</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "three": "https://threejs.org/build/three.module.js",
            "three/addons/": "https://threejs.org/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";

        const sceneElements = {
            sceneGraph: null,
            camera: null,
            renderer: null,
            control: null
        };

        const helper = {
            initEmptyScene: function (elements) {
                elements.sceneGraph = new THREE.Scene();
                elements.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
                elements.camera.position.set(10, 10, 10);

                elements.sceneGraph.add(new THREE.AmbientLight(0xffffff, 0.5));
                const light = new THREE.DirectionalLight(0xffffff, 1.2);
                light.position.set(5, 10, 7);
                elements.sceneGraph.add(light);

                elements.renderer = new THREE.WebGLRenderer({ antialias: true });
                elements.renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(elements.renderer.domElement);

                elements.control = new OrbitControls(elements.camera, elements.renderer.domElement);
            },

            render: function (elements) {
                elements.renderer.render(elements.sceneGraph, elements.camera);
            }
        };

        const scene = {
            load3DObjects: function (sceneGraph) {
                // --- BUGGY DATA SECTION ---
                // Fix the arrays

                const vertices = new Float32Array([
                    -2, -2, 2,    // 0: Front-Bottom-Left
                    2, -2, 2,    // 1: Front-Bottom-Right
                    2, 2, 2,    // 2: Front-Top-Right
                    -2, 2, 2,    // 3: Front-Top-Left
                    -2, -2, -2,    // 4: Back-Bottom-Left
                    2, -2, -2,    // 5: Back-Bottom-Right
                    2, 2, -2,    // 6: Back-Top-Right
                    -2, 2, -2     // 7: Back-Top-Left
                ]);

                const indices = [
                    // Front
                    0, 1, 2, 0, 2, 3,
                    // Back
                    4, 6, 5, 4, 7, 6,
                    // Top
                    3, 2, 6, 3, 6, 7,
                    // Bottom
                    0, 5, 1, 0, 4, 5,
                    // Right
                    1, 5, 6, 1, 6, 2,
                    // Left
                    0, 3, 7, 0, 7, 4
                ];

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                geometry.setIndex(indices);

                // computeVertexNormals is commented out!
                geometry.computeVertexNormals();

                const material = new THREE.MeshPhongMaterial({
                    color: 0xff4400,
                    wireframe: false,
                    side: THREE.DoubleSide  // See front and back of each triangle !!
                });

                const cube = new THREE.Mesh(geometry, material);

                cube.translateY(2);
                sceneGraph.add(cube);

                // --- VISUAL DEBUG HELPERS ---
                // This helper draws a small sphere at every 3-coordinate group
                const markerGeom = new THREE.SphereGeometry(0.15);
                const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

                for (let i = 0; i < vertices.length; i += 3) {
                    const marker = new THREE.Mesh(markerGeom, markerMat);
                    marker.position.set(vertices[i], vertices[i + 1], vertices[i + 2] || 0);
                    marker.position.y += 2;
                    sceneGraph.add(marker);
                }

                sceneGraph.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));
            }
        };

        function computeFrame() {
            helper.render(sceneElements);
            requestAnimationFrame(computeFrame);
        }

        function init() {
            helper.initEmptyScene(sceneElements);
            scene.load3DObjects(sceneElements.sceneGraph);
            computeFrame();
        }

        init();
    </script>
</head>

<body>
    <div id="instructions">
        <b>Fix the Cube</b><br>
        1. Check the coordinates in 'vertices'.<br>
        2. Check index order and values in 'indices'.<br>
        3. Uncomment 'computeVertexNormals()' to enable lighting.
    </div>
</body>

</html>
