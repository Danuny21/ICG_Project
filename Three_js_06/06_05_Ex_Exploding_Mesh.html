<!DOCTYPE html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Three.js - Exploding Mesh Lab</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "three": "https://threejs.org/build/three.module.js",
            "three/addons/": "https://threejs.org/examples/jsm/",
            "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
          }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import GUI from "lil-gui";

        const sceneElements = {
            sceneGraph: null, camera: null, renderer: null, control: null,
            mesh: null, originalPos: null
        };

        const params = { explosion: 0, wireframe: false };

        const helper = {
            initEmptyScene: function (elements) {
                elements.sceneGraph = new THREE.Scene();
                elements.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
                elements.camera.position.set(10, 10, 10);

                const light = new THREE.PointLight(0xffffff, 500);
                light.position.set(5, 5, 5);
                elements.sceneGraph.add(light);
                elements.sceneGraph.add(new THREE.AmbientLight(0xffffff, 0.4));

                elements.renderer = new THREE.WebGLRenderer({ antialias: true });
                elements.renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(elements.renderer.domElement);
                elements.control = new OrbitControls(elements.camera, elements.renderer.domElement);
            },
            render: function (elements) {
                elements.renderer.render(elements.sceneGraph, elements.camera);
            }
        };

        const scene = {
            load3DObjects: function (sceneGraph) {

                // 1. Create a non-indexed Icosahedron
                let geometry = new THREE.IcosahedronGeometry(3, 500); 
                geometry = geometry.toNonIndexed();

                const material = new THREE.MeshPhongMaterial({
                    color: 0xff3300,
                    side: THREE.DoubleSide,
                    flatShading: true
                });

                sceneElements.mesh = new THREE.Mesh(geometry, material);
                sceneGraph.add(sceneElements.mesh);

                // 3. Store the original "collapsed" positions
                sceneElements.originalPos = new Float32Array(geometry.attributes.position.array);
            }
        };

        function computeFrame() {
            const geo = sceneElements.mesh.geometry;
            const posAttr = geo.attributes.position;

            // Temporary vectors for math
            const vA = new THREE.Vector3();
            const vB = new THREE.Vector3();
            const vC = new THREE.Vector3();
            const faceNormal = new THREE.Vector3();

            // Iterate through every triangle (3 vertices at a time)
            for (let i = 0; i < posAttr.count; i += 3) {
                // Get the original coordinates for this triangle
                vA.fromArray(sceneElements.originalPos, i * 3);
                vB.fromArray(sceneElements.originalPos, (i + 1) * 3);
                vC.fromArray(sceneElements.originalPos, (i + 2) * 3);

                // Calculate the Normal of this specific triangle
                // Formula: (vB - vA) cross (vC - vA)
                const cb = new THREE.Vector3().subVectors(vC, vB);
                const ab = new THREE.Vector3().subVectors(vA, vB);
                faceNormal.crossVectors(cb, ab).normalize();

                // Move each vertex of the triangle outward along the normal
                const shift = faceNormal.multiplyScalar(params.explosion);

                posAttr.setXYZ(i, vA.x + shift.x, vA.y + shift.y, vA.z + shift.z);
                posAttr.setXYZ(i + 1, vB.x + shift.x, vB.y + shift.y, vB.z + shift.z);
                posAttr.setXYZ(i + 2, vC.x + shift.x, vC.y + shift.y, vC.z + shift.z);
            }

            // Vertex coordinates (i.e., positions) have been updated!!
            posAttr.needsUpdate = true;

            helper.render(sceneElements);
            requestAnimationFrame(computeFrame);
        }

        function init() {
            helper.initEmptyScene(sceneElements);
            scene.load3DObjects(sceneElements.sceneGraph);

            const gui = new GUI();
            gui.add(params, 'explosion', 0, 5).name('Explode Factor');
            gui.add(params, 'wireframe').onChange(v => sceneElements.mesh.material.wireframe = v);

            computeFrame();
        }

        init();
    </script>
</head>

<body></body>

</html>
